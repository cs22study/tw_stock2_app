name: Fetch Stock and Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch: # 支援在 GitHub 網頁上手動點擊按鈕觸發執行
  schedule:
    # 國際標準時 (UTC) 比台北時間 (UTC+8) 慢 8 小時。
    # 台北盤中 09:00 ~ 13:30 每 30 分鐘執行一次（對應 UTC 01:00 ~ 05:30）
    - cron: '*/30 1-5 * * 1-5'

# 賦予此工作部署至 GitHub Pages 的完整權限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安裝專案套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 執行 Python 查詢股價腳本
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python fetch_stock.py

      - name: 上傳網頁產物 (Artifacts)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site/'

      - name: 部署至 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
